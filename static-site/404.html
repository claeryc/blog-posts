<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Page not found.">
    <title>404 — Page Not Found</title>
    <link href="static/blog/styles.css" rel="stylesheet">
    <link href="static/blog/navbar.css" rel="stylesheet">
    <link href="static/blog/projects.css" rel="stylesheet">
    <link href="static/blog/footer.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <a href="index.html">
    <div class="logo">
      <h3 class="logo-title"><span class="name-wrapper"><span id="scrambleName">Eric's Blog</span></span></h3>
    </div>
  </a>

  <input type="checkbox" id="menu-toggle">
  <label for="menu-toggle" class="hamburger">
    <span></span>
    <span></span>
    <span></span>
  </label>

  <div class="menu">
    <a href="index.html">Home</a>
    <a href="blog.html">Blogs</a>
    <a href="recs.html">Recs</a>
    <a href="#">Contact</a>
    <button id="theme-toggle">Theme</button>
  </div>
</nav>

<div class="page-wrapper">
    <main class="mcontent">
        <div class="content-block" style="text-align: center; padding-top: 4rem;">
            <h1 style="font-size: 5rem; margin-bottom: 0.2rem;">404</h1>
            <p style="font-size: 1.2rem; margin-bottom: 1.5rem;">This page doesn't exist.</p>
            <a href="index.html" class="all">← Back home</a>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-logo">
            <img src="static/images/lucky_cat.png" alt="Logo" loading="lazy">
        </div>
        <div class="footer-content">
            <p>© 2025 claeryc.com — All Rights Reserved</p>
            <nav class="footer-links">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Privacy</a>
            </nav>
        </div>
    </footer>
</div>

<script>
    (function () {
        const savedTheme = localStorage.getItem("theme");
        const root = document.documentElement;
        if (savedTheme === "dark") { root.classList.add("dark"); root.classList.remove("light"); }
        else if (savedTheme === "light") { root.classList.add("light"); root.classList.remove("dark"); }
    })();
</script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("theme-toggle");
        if (!btn) return;
        btn.addEventListener("click", () => {
            const root = document.documentElement;
            const nowDark = root.classList.toggle("dark");
            root.classList.toggle("light", !nowDark);
            localStorage.setItem("theme", nowDark ? "dark" : "light");
        });
    });
</script>
<script>
    (function () {
        const navbar = document.querySelector('.navbar');
        if (!navbar) return;
        let lastY = window.scrollY, ticking = false;
        const threshold = 20;
        function isMenuOpen() { const t = document.getElementById('menu-toggle'); return t ? t.checked : false; }
        function update() {
            const y = window.scrollY, delta = y - lastY;
            if (Math.abs(delta) > threshold) {
                if (delta > 0 && y > threshold && !isMenuOpen()) navbar.classList.add('hide');
                else if (delta < 0) navbar.classList.remove('hide');
                lastY = y;
            } else { lastY = y; }
            ticking = false;
        }
        window.addEventListener('scroll', function () { if (!ticking) { window.requestAnimationFrame(update); ticking = true; } }, { passive: true });
    })();
</script>
<script>
    const original = "Eric's Blog", alternate = "思烨的博客";
    let showingOriginal = true, interval;
    function scrambleText(element, text) {
        const chars = "!@#$%^&*()_+=-{}[];:<>?,.";
        let iterations = 0;
        clearInterval(interval);
        interval = setInterval(() => {
            const scrambled = text.split("").map((char, i) => i < iterations ? char : chars[Math.floor(Math.random() * chars.length)]).join("");
            element.textContent = scrambled;
            if (iterations >= text.length) clearInterval(interval);
            iterations += 1 / 2;
        }, 50);
    }
    setInterval(() => {
        const nameEl = document.getElementById("scrambleName");
        showingOriginal = !showingOriginal;
        scrambleText(nameEl, showingOriginal ? original : alternate);
    }, 3000);
</script>

</body>
</html>

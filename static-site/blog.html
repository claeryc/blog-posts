<!-- Theme script -->
<script>
    (function () {
        const savedTheme = localStorage.getItem("theme");
        const root = document.documentElement;
        if (savedTheme === "dark") {
            root.classList.add("dark");
            root.classList.remove("light");
        } else if (savedTheme === "light") {
            root.classList.add("light");
            root.classList.remove("dark");
        }
    })();
</script>

<script>
    document.addEventListener("DOMContentLoaded", () => {
        const btn = document.getElementById("theme-toggle");
        if (!btn) return;
        btn.addEventListener("click", () => {
            const root = document.documentElement;
            const nowDark = root.classList.toggle("dark");
            root.classList.toggle("light", !nowDark);
            localStorage.setItem("theme", nowDark ? "dark" : "light");
        });
    });
</script>

<!-- Navbar hide-on-scroll -->
<script>
    (function () {
        const navbar = document.querySelector('.navbar');
        if (!navbar) return;
        let lastY = window.scrollY;
        let ticking = false;
        const threshold = 20;
        function isMenuOpen() {
            const menuToggle = document.getElementById('menu-toggle');
            return menuToggle ? menuToggle.checked : false;
        }
        function update() {
            const y = window.scrollY;
            const delta = y - lastY;
            if (Math.abs(delta) > threshold) {
                if (delta > 0 && y > threshold && !isMenuOpen()) {
                    navbar.classList.add('hide');
                } else if (delta < 0) {
                    navbar.classList.remove('hide');
                }
                lastY = y;
            } else {
                lastY = y;
            }
            ticking = false;
        }
        window.addEventListener('scroll', function () {
            if (!ticking) { window.requestAnimationFrame(update); ticking = true; }
        }, { passive: true });
    })();
</script>

<!-- Navbar logo scramble -->
<script>
    const original = "Eric's Blog";
    const alternate = "思烨的博客";
    let showingOriginal = true;
    let interval;
    function scrambleText(element, text) {
        const chars = "!@#$%^&*()_+=-{}[];:<>?,.";
        let iterations = 0;
        clearInterval(interval);
        interval = setInterval(() => {
            const scrambled = text.split("").map((char, i) => {
                if (i < iterations) return char;
                return chars[Math.floor(Math.random() * chars.length)];
            }).join("");
            element.textContent = scrambled;
            if (iterations >= text.length) clearInterval(interval);
            iterations += 1 / 2;
        }, 50);
    }
    setInterval(() => {
        const nameEl = document.getElementById("scrambleName");
        showingOriginal = !showingOriginal;
        scrambleText(nameEl, showingOriginal ? original : alternate);
    }, 3000);
</script>

<!-- Client-side search filter -->
<script>
    document.addEventListener("DOMContentLoaded", function () {
        const form = document.getElementById("search-form");
        const input = document.getElementById("search-input");
        const cards = document.querySelectorAll(".post-card");
        const noResults = document.getElementById("no-results");

        // Read ?q= from URL on page load
        const params = new URLSearchParams(window.location.search);
        const qParam = params.get("q");
        if (qParam) {
            input.value = qParam;
            filterPosts(qParam);
        }

        form.addEventListener("submit", function (e) {
            e.preventDefault();
            filterPosts(input.value);
            // Update URL without reload
            const url = new URL(window.location);
            if (input.value) {
                url.searchParams.set("q", input.value);
            } else {
                url.searchParams.delete("q");
            }
            history.pushState({}, "", url);
        });

        input.addEventListener("input", function () {
            filterPosts(input.value);
        });

        function filterPosts(query) {
            const q = query.trim().toLowerCase();
            let visible = 0;
            cards.forEach(card => {
                const title = card.getAttribute("data-title").toLowerCase();
                if (!q || title.includes(q)) {
                    card.style.display = "";
                    visible++;
                } else {
                    card.style.display = "none";
                }
            });
            noResults.style.display = visible === 0 ? "block" : "none";
        }
    });
</script>
